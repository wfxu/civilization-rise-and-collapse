<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>文明崛起与崩溃 · 监控终端</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#0a0e18"/>
    <g stroke="#ffb547" stroke-width="2" fill="none">
      <rect x="60" y="60" width="80" height="80"/>
      <line x1="60" y1="60" x2="140" y2="140"/>
      <line x1="140" y1="60" x2="60" y2="140"/>
      <circle cx="100" cy="100" r="20" stroke="#5ad6e8"/>
    </g>
    <text x="100" y="170" fill="#ffb547" font-family="monospace" font-size="14" text-anchor="middle">CIV</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<!-- React + Babel pinned versions -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Module load order: types -> rng -> data -> world -> renderer -> sim engine -> UI -> App -> bootstrap -->
<script type="text/babel" data-presets="env,react,typescript" src="utils/types.tsx"></script>
<script type="text/babel" data-presets="env,react,typescript" src="utils/rng.tsx"></script>
<script type="text/babel" data-presets="env,react,typescript" src="data/constants.tsx"></script>
<script type="text/babel" data-presets="env,react,typescript" src="simulation/world.tsx"></script>
<script type="text/babel" data-presets="env,react,typescript" src="rendering/mapRenderer.tsx"></script>
<script type="text/babel" data-presets="env,react,typescript" src="simulation/engine.tsx"></script>
<script type="text/babel" data-presets="env,react,typescript" src="components/Panels.tsx"></script>
<script type="text/babel" data-presets="env,react,typescript" src="components/App.tsx"></script>

<script type="text/babel" data-presets="env,react,typescript">
  const App = window.__App;
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>
</body>
</html>
